<!doctype html>
<html>
  <head>
    <title>Chat</title>
    <link rel="stylesheet" href="/static/chat.css" />
  </head>
  <body>
    <div class="app">
      <div class="sidebar">
        <div class="profile">
          <div class="avatar" id="avatar">U</div>
          <div class="profile-info">
            <div class="username" id="loggedUser">User</div>
            <div class="status">Online</div>
          </div>
        </div>

        <div class="sidebar-header">
          <h2>Chats</h2>

          <div class="actions">
            <button onclick="goToGroups()">Add Group</button>
            <button onclick="logout()">Logout</button>
          </div>
        </div>

        <div class="section-title">Groups</div>
        <div id="groups"></div>

        <div class="section-title">Users</div>
        <div id="users"></div>
      </div>

      <div class="chat-area">
        <div id="chat-header">Select a chat</div>

        <div id="group-actions" class="group-actions hidden">
          <div class="group-left">
            <span id="group-name"></span>

            <button class="members-toggle" onclick="toggleMembersDropdown()">
              Members ▼
            </button>

            <div id="membersDropdown" class="members-dropdown hidden"></div>
          </div>

          <div class="group-controls">
            <input id="newMember" placeholder="Add member..." />
            <button onclick="addMember()">Add</button>
          </div>
        </div>

        <div id="messages"></div>

        <div class="input-area">
          <input id="messageInput" placeholder="Type message..." />
          <button onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>

    <script src="/static/chat.js"></script>

    <script>
      function goToGroups() {
        window.location.href = "/groups-page";
      }
    </script>
  </body>
</html>
