<!doctype html>
<html>
  <head>
    <title>Login</title>
    <link rel="stylesheet" href="/static/login.css" />
    <style>
      .message-box {
        margin-top: 10px;
        padding: 10px;
        border-radius: 8px;
        font-size: 14px;
        display: none;
        opacity: 0;
        transform: translateY(-10px);
      }

      .message-box.show {
        display: block;
        animation: slideFade 0.4s ease forwards;
      }

      .success {
        background: rgba(46, 204, 113, 0.2);
        border: 1px solid #2ecc71;
        color: #2ecc71;
      }

      .error {
        background: rgba(231, 76, 60, 0.2);
        border: 1px solid #e74c3c;
        color: #e74c3c;
      }

      @keyframes slideFade {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>

  <body class="login-body">
    <div class="login-card">
      <div class="logo">💬</div>

      <h1>Welcome Back</h1>
      <p>Sign in to continue to your chats</p>

      <input id="username" placeholder="Enter your username" />
      <input id="password" type="password" placeholder="Enter password" />

      <button onclick="login()">Sign In</button>

      <button
        onclick="goToRegister()"
        style="margin-top: 10px; background: #4caf50"
      >
        Register
      </button>

      <div id="messageBox" class="message-box"></div>
    </div>

    <script>
      function showMessage(text, type) {
        const box = document.getElementById("messageBox");

        box.className = "message-box " + type + " show";
        box.innerText = text;

        setTimeout(() => {
          box.classList.remove("show");
        }, 3000);
      }

      async function login() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();

        if (!username || !password) {
          showMessage("Enter username and password", "error");
          return;
        }

        try {
          const res = await fetch("/auth/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              username: username,
              password: password,
            }),
          });

          const data = await res.json();

          if (!res.ok) {
            showMessage(data.detail, "error");
            return;
          }

          localStorage.setItem("username", data.username);
          localStorage.setItem("token", data.access_token);

          showMessage("Login successful 🚀", "success");

          setTimeout(() => {
            window.location.href = "/chat";
          }, 1000);
        } catch (err) {
          console.error(err);
          showMessage("Login error", "error");
        }
      }

      function goToRegister() {
        window.location.href = "/register";
      }
    </script>
  </body>
</html>
